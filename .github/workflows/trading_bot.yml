name: Trading Bot

on:
  schedule:
    - cron: '*/5 13-20 * * 1-5'
    - cron: '0,5,10,15,20,25,30,35,40,45,50,55 21 * * 1-5'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run trading cycle
        env:
          ALPACA_API_KEY: ${{ secrets.ALPACA_API_KEY }}
          ALPACA_SECRET_KEY: ${{ secrets.ALPACA_SECRET_KEY }}
          ALPACA_PAPER: ${{ secrets.ALPACA_PAPER }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python run_once.py

      - name: Save state to repo
        run: |
          git config user.name "Trading Bot"
          git config user.email "bot@github-actions"
          git add bot_state.json || true
          git diff --staged --quiet || git commit -m "bot: update state [skip ci]"
          git push
        continue-on-error: true
